<!DOCTYPE html>

<html class="dark" lang="id"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SmartRoad AI - Smart Map View</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&amp;family=Manrope:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-background": "#dee1f7",
                        "background": "#0e1322",
                        "on-secondary-container": "#00616d",
                        "on-tertiary-fixed-variant": "#414658",
                        "outline": "#849585",
                        "on-error": "#690005",
                        "on-tertiary-fixed": "#161b2b",
                        "on-error-container": "#ffdad6",
                        "on-surface-variant": "#b9cbb9",
                        "on-secondary-fixed": "#001f24",
                        "surface-container": "#1a1f2f",
                        "on-primary-fixed": "#00210c",
                        "surface-container-highest": "#2f3445",
                        "primary-fixed": "#60ff98",
                        "error-container": "#93000a",
                        "on-tertiary": "#2b3040",
                        "secondary-fixed": "#9cf0ff",
                        "error": "#ffb4ab",
                        "on-primary": "#003919",
                        "on-tertiary-container": "#5c6173",
                        "outline-variant": "#3b4b3d",
                        "surface-container-high": "#25293a",
                        "secondary": "#bdf4ff",
                        "surface": "#0e1322",
                        "on-surface": "#dee1f7",
                        "inverse-on-surface": "#2b3040",
                        "secondary-container": "#00e3fd",
                        "tertiary": "#fcfaff",
                        "surface-container-low": "#161b2b",
                        "tertiary-fixed": "#dee1f7",
                        "inverse-primary": "#006d36",
                        "primary-container": "#00ff87",
                        "on-primary-fixed-variant": "#005227",
                        "tertiary-fixed-dim": "#c2c6db",
                        "primary": "#f1ffef",
                        "surface-tint": "#00e478",
                        "surface-variant": "#2f3445",
                        "secondary-fixed-dim": "#00daf3",
                        "on-secondary-fixed-variant": "#004f58",
                        "on-primary-container": "#007138",
                        "on-secondary": "#00363d",
                        "surface-dim": "#0e1322",
                        "surface-bright": "#343949",
                        "surface-container-lowest": "#090e1c",
                        "inverse-surface": "#dee1f7",
                        "tertiary-container": "#d9ddf3"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Manrope"],
                        "label": ["Manrope"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .marker-glow-red {
            box-shadow: 0 0 20px rgba(255, 180, 171, 0.6);
        }
        .marker-glow-yellow {
            box-shadow: 0 0 20px rgba(189, 244, 255, 0.4);
        }
        body {
            background-color: #0e1322;
            overflow: hidden;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="font-body text-on-surface">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#0e1322]/60 backdrop-blur-3xl shadow-[0_0_15px_rgba(0,255,135,0.1)] flex justify-between items-center px-6 py-4 w-full">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full border-2 border-primary-container flex items-center justify-center bg-surface-container-high text-on-surface-variant">
<span class="material-symbols-outlined text-3xl" data-icon="account_circle">account_circle</span>
</div>
<span class="text-2xl font-bold tracking-tighter text-white font-headline">SmartRoad AI</span>
</div>
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-surface-container-high text-primary-container hover:bg-[#00ff87]/10 hover:scale-105 transition-transform active:scale-95 duration-200">
<span class="material-symbols-outlined" data-icon="notifications">notifications</span>
</button>
</header>
<!-- Main Map Canvas -->
<main class="relative h-screen w-full pt-20">
<!-- Mock Map Background -->
<div class="absolute inset-0 bg-surface-container-lowest">
<div class="w-full h-full opacity-60 grayscale brightness-50" data-alt="dark high-contrast satellite view of urban streets and grid layout at night with glowing blue and teal accents" data-location="Kebumen" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBjfYwIG09B_CN9QOdP_LmkvCq2rTipT9FWi5n6XL3YOcuGEkclDvEHOAR0G5M2rTjMtd3Cu8ilkEOv2OhPjsBk972EZCiGVUNlzZFEwVX9fD1JyAW3HPgoQ8_P1gd1spifEQ4t_kIOZqWbldHFxZAG4XB8tPP-k2A8VrGwgYonLIg6ClsRq6J3zdu7POExYEAxDxeYFO_b-pucph2qwjKOah93AaGpjvSNIgvj_R9kb1rTMv3PNeVlk7u9rciY2YhTYFcb5uZghAU'); background-size: cover; background-position: center;">
</div>
<!-- HUD Overlays -->
<div class="absolute inset-0 pointer-events-none bg-gradient-to-b from-background via-transparent to-background/80"></div>
<div class="absolute top-24 left-6 flex flex-col gap-4">
<div class="bg-surface-container-high/60 backdrop-blur-xl p-4 rounded-lg border border-outline-variant/15 pointer-events-auto">
<p class="text-[10px] uppercase tracking-widest text-primary-container font-headline font-bold mb-2">Sistem Monitoring</p>
<div class="flex items-center gap-2">
<div class="w-2 h-2 rounded-full bg-primary-container animate-pulse"></div>
<span class="text-xs text-on-surface">Aktif: Kebumen Tengah</span>
</div>
</div>
</div>
<!-- Map Markers -->
<!-- Red Pin (Active/Tapped) -->
<div class="absolute top-[45%] left-[55%] pointer-events-auto">
<div class="flex flex-col items-center">
<div class="w-8 h-8 rounded-full bg-error flex items-center justify-center marker-glow-red border-2 border-surface cursor-pointer">
<span class="material-symbols-outlined text-on-error text-sm" data-icon="warning" style="font-variation-settings: 'FILL' 1;">warning</span>
</div>
<div class="w-1 h-4 bg-gradient-to-b from-error to-transparent"></div>
</div>
</div>
<!-- Yellow Pins (Moderate) -->
<div class="absolute top-[30%] left-[40%]">
<div class="w-6 h-6 rounded-full bg-secondary-container flex items-center justify-center marker-glow-yellow border-2 border-surface opacity-80">
<span class="material-symbols-outlined text-on-secondary-container text-[12px]" data-icon="report" style="font-variation-settings: 'FILL' 1;">report</span>
</div>
</div>
<div class="absolute top-[60%] left-[30%]">
<div class="w-6 h-6 rounded-full bg-secondary-container flex items-center justify-center marker-glow-yellow border-2 border-surface opacity-80">
<span class="material-symbols-outlined text-on-secondary-container text-[12px]" data-icon="report" style="font-variation-settings: 'FILL' 1;">report</span>
</div>
</div>
</div>
<!-- Floating Controls -->
<div class="absolute top-24 right-6 flex flex-col gap-3">
<button class="w-12 h-12 rounded-lg bg-surface-container-high/80 backdrop-blur-md flex items-center justify-center text-on-surface hover:bg-primary-container hover:text-on-primary transition-all">
<span class="material-symbols-outlined" data-icon="add">add</span>
</button>
<button class="w-12 h-12 rounded-lg bg-surface-container-high/80 backdrop-blur-md flex items-center justify-center text-on-surface hover:bg-primary-container hover:text-on-primary transition-all">
<span class="material-symbols-outlined" data-icon="remove">remove</span>
</button>
<button class="w-12 h-12 rounded-lg bg-surface-container-high/80 backdrop-blur-md flex items-center justify-center text-on-surface hover:bg-primary-container hover:text-on-primary transition-all">
<span class="material-symbols-outlined" data-icon="my_location">my_location</span>
</button>
</div>
<!-- Bottom Sheet Interaction Card -->
<div class="absolute bottom-32 left-1/2 -translate-x-1/2 w-[calc(100%-3rem)] max-w-md z-40">
<div class="bg-surface-container-high/60 backdrop-blur-2xl rounded-xl shadow-[0_40px_80px_rgba(0,0,0,0.6)] border border-outline-variant/10 overflow-hidden">
<div class="p-6">
<div class="flex items-start justify-between mb-4">
<div>
<span class="inline-block px-3 py-1 rounded-full bg-error-container text-on-error-container text-[10px] font-bold uppercase tracking-wider mb-2">Parah (Severe)</span>
<h2 class="text-xl font-headline font-bold text-white tracking-tight">Jl. Pemuda, Kebumen</h2>
<p class="text-on-surface-variant text-sm mt-1">Dideteksi oleh AI: 2 jam yang lalu</p>
</div>
<button class="text-on-surface-variant hover:text-white">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
</div>
<!-- Pothole Image Preview -->
<div class="relative h-44 w-full rounded-md overflow-hidden mb-6 group">
<img alt="Pothole" class="w-full h-full object-cover" data-alt="close-up view of a deep, dangerous pothole in an asphalt road with cracked edges and debris" src="https://lh3.googleusercontent.com/aida-public/AB6AXuADFRQ8wGmt_U3FTBRloPC0Fe0qSIJbBG3ISgFyY7rBqLOn5ZTHI5pl_uBJAfKk7L0RWsJvzrcIU4AV-zGdSwOChfTXpXAhLj8GuYS-rP8lqM8VH7MIJ2wyX-dT86rZTlPiF86hSAELQ4R5ojIBuz7okayp-EeA7Y1jFq3sDNdl46caJBrGlFJqJz7XRd407k8rDtLC3q1acqjZcU77PEMzypZx25BJXfRIu7dmjJy5mIyRhUJSgLNuUwwYKGPBViA-tqdNVQCDiy0"/>
<div class="absolute inset-0 bg-gradient-to-t from-black/80 to-transparent flex items-end p-4">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary-container text-sm" data-icon="visibility">visibility</span>
<span class="text-[11px] text-white/80 font-medium">98.4% Confidence Score</span>
</div>
</div>
</div>
<div class="flex gap-3">
<button class="flex-1 bg-gradient-to-br from-[#f1ffef] to-[#00ff87] text-[#003919] font-bold py-3 px-6 rounded-full flex items-center justify-center gap-2 active:scale-95 transition-all shadow-[0_0_15px_rgba(0,255,135,0.3)]">
<span class="material-symbols-outlined text-lg" data-icon="info">info</span>
                            Lihat Detail
                        </button>
<button class="w-14 h-14 rounded-full bg-surface-container-highest flex items-center justify-center text-on-surface border border-outline-variant/20 hover:bg-surface-variant transition-colors">
<span class="material-symbols-outlined" data-icon="share">share</span>
</button>
</div>
</div>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-6 pt-2 bg-[#161b2b]/60 backdrop-blur-2xl rounded-t-[3rem] shadow-[0_-10px_40px_rgba(0,0,0,0.4)] z-50">
<!-- Beranda -->
<a class="flex flex-col items-center justify-center text-slate-400 p-3 hover:text-[#00ff87] transition-colors active:scale-90 transition-all duration-300" href="#">
<span class="material-symbols-outlined" data-icon="home">home</span>
<span class="font-['Manrope'] text-[10px] uppercase tracking-widest mt-1">Beranda</span>
</a>
<!-- Peta Keluhan (Active) -->
<a class="flex flex-col items-center justify-center bg-gradient-to-br from-[#f1ffef] to-[#00ff87] text-[#0e1322] rounded-full p-3 shadow-[0_0_15px_rgba(0,255,135,0.3)] active:scale-90 transition-all duration-300" href="#">
<span class="material-symbols-outlined" data-icon="map" style="font-variation-settings: 'FILL' 1;">map</span>
<span class="font-['Manrope'] text-[10px] uppercase tracking-widest mt-1">Peta Keluhan</span>
</a>
<!-- Laporan Saya -->
<a class="flex flex-col items-center justify-center text-slate-400 p-3 hover:text-[#00ff87] transition-colors active:scale-90 transition-all duration-300" href="#">
<span class="material-symbols-outlined" data-icon="analytics">analytics</span>
<span class="font-['Manrope'] text-[10px] uppercase tracking-widest mt-1">Laporan Saya</span>
</a>
<!-- Profil -->
<a class="flex flex-col items-center justify-center text-slate-400 p-3 hover:text-[#00ff87] transition-colors active:scale-90 transition-all duration-300" href="#">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="font-['Manrope'] text-[10px] uppercase tracking-widest mt-1">Profil</span>
</a>
</nav>
<!-- Scan Line Effect -->
<div class="fixed inset-0 pointer-events-none overflow-hidden z-10">
<div class="w-full h-[1px] bg-primary-container/20 shadow-[0_0_10px_rgba(0,255,135,0.5)] animate-[scan_8s_linear_infinite]"></div>
</div>
<style>
        @keyframes scan {
            from { transform: translateY(-100vh); }
            to { transform: translateY(100vh); }
        }
    </style>
</body></html>
