</button>

</div>
<!-- AI Detection Overlay -->
<div class="relative z-10 h-full flex flex-col items-center justify-center pointer-events-none">
<!-- Neon Bounding Box -->
<div class="relative w-64 h-64 border-2 border-primary-container rounded-md shadow-[0_0_20px_rgba(0,255,135,0.6)] animate-pulse">

<div class="absolute -top-1 -right-1 w-6 h-6 border-t-4 border-r-4 border-primary-container"></div>
<div class="absolute -bottom-1 -left-1 w-6 h-6 border-b-4 border-l-4 border-primary-container"></div>
<div class="absolute -bottom-1 -right-1 w-6 h-6 border-b-4 border-r-4 border-primary-container"></div>
<!-- Label within box -->
<div class="absolute -top-8 left-0 bg-primary-container px-2 py-0.5 rounded text-on-primary font-bold text-xs">
                    POTHOLE_042
                </div>
</div>
<!-- Floating Status Pills -->
<div class="mt-8 flex flex-col gap-3 items-center">
<div class="bg-error-container/80 backdrop-blur-md px-6 py-2 rounded-full border border-error/30 flex items-center gap-2 pointer-events-auto shadow-lg">
<span class="material-symbols-outlined text-error" data-icon="warning">warning</span>
<span class="text-on-error-container font-bold tracking-tight">⚠️ Kerusakan Terdeteksi</span>
</div>
<div class="bg-surface-container-high/80 backdrop-blur-md px-6 py-2 rounded-full border border-primary-container/30 flex items-center gap-2 pointer-events-auto shadow-lg">
<span class="material-symbols-outlined text-primary-container" data-icon="query_stats">query_stats</span>
<span class="text-on-surface font-semibold">Tingkat Keyakinan: 92%</span>
</div>
</div>
</div>
<!-- Scanning Line Visual -->
<div class="absolute inset-x-0 h-1 bg-gradient-to-r from-transparent via-primary-container to-transparent opacity-30 shadow-[0_0_10px_rgba(0,255,135,0.5)] z-20 animate-[bounce_4s_infinite]"></div>
</main>
<!-- Bottom Panel (Glassmorphism Sheet) -->

<div class="bg-surface-container-high/60 backdrop-blur-2xl rounded-xl p-6 shadow-2xl border border-white/5">

<div>

</div>
</div>
<div class="bg-primary-container/10 p-3 rounded-md">
<span class="material-symbols-outlined text-primary-container" data-icon="map">map</span>
</div>
</div>

<span class="material-symbols-outlined" data-icon="send">send</span>

            </button>

<span class="material-symbols-outlined" data-icon="map">map</span>
<span class="font-['Manrope'] text-[10px] uppercase tracking-widest mt-1">Peta Keluhan</span>

<div class="w-3 h-3 bg-primary-container rounded-full animate-ping"></div>
</div>
</div>
